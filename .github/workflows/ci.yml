name: Build vgpu for PowerVR

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Checkout llama.cpp (PowerVR fork)
        run: git clone --depth=1 https://github.com/voznyiarsen/llama.cpp.git ../llama.cpp-ggml-org

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            python3 \
            python3-pip \
            python3-venv \
            gcc-14 g++-14 \
            libssl-dev \
            ccache
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"

      - name: Get latest Vulkan SDK version
        id: vulkan_sdk_version
        run: echo "VULKAN_SDK_VERSION=$(curl -s https://vulkan.lunarg.com/sdk/latest/linux.txt)" >> "$GITHUB_ENV"

      - name: Cache Vulkan SDK
        uses: actions/cache@v5
        id: cache-sdk
        with:
          path: ./vulkan_sdk
          key: vulkan-sdk-${{ env.VULKAN_SDK_VERSION }}-${{ runner.os }}

      - name: Setup Vulkan SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/linux/vulkan_sdk.tar.xz" -o vulkan_sdk.tar.xz
          mkdir -p vulkan_sdk
          tar -xf vulkan_sdk.tar.xz -C vulkan_sdk --strip-components=1
          rm vulkan_sdk.tar.xz

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Source Vulkan SDK environment
        run: |
          source ./vulkan_sdk/setup-env.sh
          echo "VULKAN_SDK=${VULKAN_SDK}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${VULKAN_SDK}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "${VULKAN_SDK}/bin" >> "$GITHUB_PATH"

      - name: Build
        run: bash scripts/build.sh all

      - name: Test
        run: bash scripts/test.sh

      - name: Package
        run: bash scripts/package.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vgpu-release
          path: release/

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name == 'main' && 'continuous' || github.ref_name }}"
          gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null && \
            gh release delete "$TAG" --repo "${{ github.repository }}" --yes || true
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name == 'main' && 'Latest build' || github.ref_name }}" \
            --notes "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
            --prerelease="${{ github.ref_name == 'main' && 'true' || 'false' }}" \
            ${{ github.ref_name == 'main' && '--latest' || '' }} \
            release/*
